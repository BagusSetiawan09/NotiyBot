<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NotiyBot Alert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: transparent; overflow: hidden; margin: 0; padding: 0; }
        .slide-in { animation: slideIn 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes slideIn { from { transform: translateY(150%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .floating { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-6px); } 100% { transform: translateY(0px); } }
        @keyframes blink { 0%, 46%, 48%, 50%, 52%, 100% { transform: scaleY(1); } 47%, 51% { transform: scaleY(0.1); } }
        .eye { animation: blink 5s infinite; transform-origin: center; }
        .pop-bubble { opacity: 0; transform: scale(0.5); transform-origin: right center; animation: popOut 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; animation-delay: 0.6s; }
        @keyframes popOut { to { transform: scale(1); opacity: 1; } }
        .chat-tail::after { content: ''; position: absolute; top: 50%; right: -8px; transform: translateY(-50%); border-width: 8px 0 8px 8px; border-style: solid; border-color: transparent transparent transparent rgba(39, 39, 42, 0.95); }
    </style>
</head>
<body class="flex items-center justify-end h-screen select-none px-4">
    <div class="flex items-center gap-4 slide-in">
        <div class="pop-bubble bg-[#27272a]/95 backdrop-blur-md text-white px-4 py-3 rounded-2xl relative chat-tail shadow-2xl border border-[#3f3f46] max-w-[180px]">
            <p id="notif-text" class="font-medium text-[13px] leading-snug">Waktunya minum bos!</p>
        </div>

        <div id="tabbie-container" class="floating bg-black w-[130px] h-[90px] rounded-[24px] relative shadow-[0_10px_30px_rgba(0,0,0,0.8)] border-[3px] border-[#222] flex-shrink-0 overflow-hidden">
            <div class="eye absolute left-[30px] top-[22px] w-[16px] h-[28px] bg-white rounded-full"></div>
            <div class="eye absolute right-[30px] top-[22px] w-[16px] h-[28px] bg-white rounded-full"></div>
            <div class="absolute bottom-[18px] left-1/2 -translate-x-1/2 w-[26px] h-[10px] border-b-[3.5px] border-white rounded-b-full"></div>
        </div>
    </div>
</body>
</html>
