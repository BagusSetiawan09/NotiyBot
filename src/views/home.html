<header class="mb-8 mt-2 flex justify-between items-end">
    <div>
        <p id="live-date" class="text-gray-500 text-[11px] font-bold uppercase tracking-[0.2em] mb-3">Loading date...</p>
        <h1 id="dynamic-greeting" class="text-3xl font-bold tracking-tight text-white mb-3">Good afternoon</h1>
        
        <div id="daily-snapshot" class="flex items-center gap-3 text-xs font-medium text-gray-400 opacity-0 transition-opacity duration-1000">
            <span class="flex items-center gap-1.5" title="Completed Tasks">
                <svg class="w-3.5 h-3.5 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 
                <span id="snap-tasks">0/0 Tasks</span>
            </span>
            <span class="text-[#3f3f46]">•</span>
            <span class="flex items-center gap-1.5" title="Hydration">
                <svg class="w-3.5 h-3.5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg> 
                <span id="snap-water">0/8 Glasses</span>
            </span>
            <span class="text-[#3f3f46]">•</span>
            <span class="flex items-center gap-1.5" title="Total Screen Time">
                <svg class="w-3.5 h-3.5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg> 
                <span id="snap-screentime">0m</span>
            </span>
        </div>
    </div>
    <div class="text-right">
        <h2 id="live-time" class="text-4xl font-medium tracking-tighter text-white">00:00</h2>
    </div>
</header>

<div class="grid grid-cols-2 gap-4">
    
    <div class="bg-[#18181b] border border-[#3f3f46] p-6 rounded-2xl col-span-2 shadow-sm relative overflow-hidden flex flex-col justify-between">
        <div class="flex justify-between items-start mb-6">
            <div>
                <div class="flex items-center gap-2 mb-2">
                    <span id="pomo-dot" class="w-2.5 h-2.5 rounded-full bg-gray-600"></span>
                    <p class="text-[10px] text-gray-500 font-bold tracking-widest uppercase" id="pomo-status-text">Focus Session (25m)</p>
                </div>
                <h2 class="text-6xl font-medium text-white tracking-tight leading-none" id="pomo-time">25:00</h2>
            </div>
            <div class="flex gap-3 mt-1">
                <button onclick="resetPomodoro()" title="Reset Timer" class="w-10 h-10 rounded-full bg-[#242427] hover:bg-[#3f3f46] text-gray-400 flex items-center justify-center transition border border-transparent hover:border-[#52525b]">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
                <button onclick="togglePomodoro()" id="btn-pomo-play" class="w-12 h-12 rounded-full bg-blue-600 hover:bg-blue-500 text-white flex items-center justify-center transition shadow-lg">
                    <svg class="w-5 h-5 ml-0.5" id="pomo-icon" fill="currentColor" viewBox="0 0 20 20"><path d="M4 4l12 6-12 6z"></path></svg>
                </button>
            </div>
        </div>
        <div class="w-full bg-[#27272a] h-1.5 rounded-full overflow-hidden">
            <div id="pomo-progress" class="bg-blue-500 h-full rounded-full w-0 transition-all duration-1000 ease-linear"></div>
        </div>
    </div>

    <div class="bg-[#18181b] p-5 rounded-2xl border border-[#3f3f46] flex flex-col justify-between shadow-sm group hover:bg-[#242427] transition duration-300">
        <div class="flex justify-between items-center mb-4">
            <div class="flex items-center gap-2 text-cyan-500">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                <p class="text-[10px] font-bold uppercase tracking-widest">Hydration</p>
            </div>
            <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity duration-300">
                <button onclick="updateWater(-1)" class="w-6 h-6 rounded bg-[#3f3f46] hover:bg-gray-500 text-gray-200 flex items-center justify-center transition text-sm font-bold">-</button>
                <button onclick="updateWater(1)" class="w-6 h-6 rounded bg-cyan-600 hover:bg-cyan-500 text-white flex items-center justify-center transition text-sm font-bold">+</button>
            </div>
        </div>
        <div class="flex items-baseline gap-1.5">
            <h3 class="text-3xl font-medium text-white" id="water-count">0</h3>
            <span class="text-gray-500 text-sm font-medium">/ 8 Glasses</span>
        </div>
    </div>

    <div class="bg-[#18181b] p-5 rounded-2xl border border-[#3f3f46] flex flex-col justify-between shadow-sm">
        <div class="flex items-center gap-2 text-purple-400 mb-4">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <p class="text-[10px] font-bold uppercase tracking-widest">Up Next</p>
        </div>
        <h3 id="up-next-text" class="text-sm font-medium text-gray-300 line-clamp-2 leading-relaxed">Analyzing schedule...</h3>
    </div>

    <div class="bg-[#18181b] p-5 rounded-2xl border border-[#3f3f46] flex flex-col justify-between shadow-sm cursor-pointer hover:bg-[#242427] transition duration-300" onclick="toggleDND()">
        <div class="flex justify-between items-center mb-5">
            <div class="flex items-center gap-2 text-red-400" id="dnd-icon-wrapper">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9m-5 0h14"></path></svg>
                <p class="text-[10px] font-bold uppercase tracking-widest">Do Not Disturb</p>
            </div>
            <div class="relative inline-flex items-center">
                <div id="dnd-track" class="w-8 h-4 bg-[#3f3f46] rounded-full transition-colors duration-300"></div>
                <div id="dnd-thumb" class="absolute left-0.5 top-0.5 bg-gray-400 w-3 h-3 rounded-full transition-all duration-300"></div>
            </div>
        </div>
        <p id="dnd-status" class="text-sm font-medium text-gray-500">Notifications are ON</p>
    </div>

    <div class="bg-[#18181b] p-5 rounded-2xl border border-[#3f3f46] flex flex-col justify-center relative overflow-hidden shadow-sm">
        <svg class="absolute -bottom-2 -right-2 w-16 h-16 text-[#27272a] opacity-50" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"></path></svg>
        <p id="quote-text" class="text-sm font-medium text-gray-400 italic relative z-10 leading-relaxed">...</p>
    </div>
</div>
