<header class="mb-6 mt-2 flex justify-between items-end">
    <div>
        <p id="live-date" class="text-gray-400 text-[13px] mb-1 font-bold uppercase tracking-widest">Memuat tanggal...</p>
        <h1 id="dynamic-greeting" class="text-3xl font-black tracking-tight text-white">Good afternoon</h1>
    </div>
    <div class="text-right">
        <h2 id="live-time" class="text-4xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-blue-400 to-cyan-300 drop-shadow-lg">00:00</h2>
    </div>
</header>

<div class="grid grid-cols-2 gap-4">
    <div class="bg-[#242427] p-6 rounded-[20px] col-span-2 shadow-xl border border-[#3f3f46] relative overflow-hidden group">
        <div class="absolute top-0 right-0 w-48 h-48 bg-blue-500/5 rounded-full blur-3xl -mr-10 -mt-10 transition duration-500 group-hover:bg-blue-500/10"></div>
        <div class="flex justify-between items-center relative z-10">
            <div>
                <div class="flex items-center gap-2 mb-1">
                    <span class="flex h-2.5 w-2.5 relative">
                        <span id="pomo-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75 hidden"></span>
                        <span id="pomo-dot" class="relative inline-flex rounded-full h-2.5 w-2.5 bg-gray-500"></span>
                    </span>
                    <p class="text-[11px] text-gray-400 font-bold tracking-widest uppercase" id="pomo-status-text">SESI FOKUS (25 MNT)</p>
                </div>
                <h2 class="text-[40px] font-black mb-1 text-white tracking-tight leading-none" id="pomo-time">25:00</h2>
            </div>
            <div class="flex gap-2">
                <button onclick="togglePomodoro()" id="btn-pomo-play" class="w-12 h-12 rounded-full bg-gradient-to-br from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white flex items-center justify-center shadow-[0_0_15px_rgba(59,130,246,0.3)] transition transform hover:scale-105 active:scale-95">
                    <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path id="pomo-icon" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"></path></svg>
                </button>
                <button onclick="resetPomodoro()" title="Reset Timer" class="w-12 h-12 rounded-full bg-[#3f3f46] hover:bg-[#52525b] text-white flex items-center justify-center transition transform hover:scale-105 active:scale-95">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                </button>
            </div>
        </div>
        <div class="w-full bg-[#18181b] rounded-full h-1.5 mt-5 overflow-hidden relative z-10">
            <div id="pomo-progress" class="bg-gradient-to-r from-blue-500 to-cyan-400 h-1.5 rounded-full w-0 transition-all duration-1000 ease-linear"></div>
        </div>
    </div>

    <div class="bg-[#242427] p-5 rounded-[20px] shadow-xl border border-[#3f3f46] relative overflow-hidden flex flex-col justify-between hover:border-cyan-500/40 transition duration-300">
        <div class="flex justify-between items-start mb-4">
            <div class="w-10 h-10 rounded-xl bg-cyan-500/10 flex items-center justify-center text-cyan-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
            </div>
            <div class="flex gap-1.5">
                <button onclick="updateWater(-1)" class="w-7 h-7 rounded-lg bg-[#3f3f46] hover:bg-[#52525b] flex items-center justify-center transition text-gray-300 font-bold active:scale-95">-</button>
                <button onclick="updateWater(1)" class="w-7 h-7 rounded-lg bg-cyan-600 hover:bg-cyan-500 flex items-center justify-center transition text-white font-bold shadow-lg shadow-cyan-500/20 active:scale-95">+</button>
            </div>
        </div>
        <div>
            <p class="text-[11px] text-gray-400 font-bold tracking-widest uppercase mb-0.5">Target Minum</p>
            <h3 class="text-3xl font-black text-white"><span id="water-count">0</span><span class="text-gray-500 text-[16px] font-bold"> / 8 Gelas</span></h3>
        </div>
    </div>

    <div class="bg-[#242427] p-5 rounded-[20px] shadow-xl border border-[#3f3f46] flex flex-col justify-between hover:border-purple-500/40 transition duration-300">
        <div class="w-10 h-10 rounded-xl bg-purple-500/10 flex items-center justify-center text-purple-400 mb-4">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </div>
        <div>
            <p class="text-[11px] text-gray-400 font-bold tracking-widest uppercase mb-1">Up Next</p>
            <h3 id="up-next-text" class="text-sm font-semibold text-gray-200 line-clamp-2 leading-tight">Menganalisis jadwal...</h3>
        </div>
    </div>

    <div class="bg-[#242427] p-5 rounded-[20px] shadow-xl border border-[#3f3f46] flex flex-col justify-between hover:border-red-500/30 transition duration-300 cursor-pointer" onclick="toggleDND()">
        <div class="flex justify-between items-start mb-4">
            <div id="dnd-icon-bg" class="w-10 h-10 rounded-xl bg-red-500/10 flex items-center justify-center text-red-400 transition duration-300">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9m-5 0h14"></path></svg>
            </div>
            <div class="relative inline-flex items-center">
                <div id="dnd-track" class="w-11 h-6 bg-[#3f3f46] rounded-full transition-colors duration-300 shadow-inner"></div>
                <div id="dnd-thumb" class="absolute left-1 top-1 bg-white w-4 h-4 rounded-full transition-transform duration-300 shadow-md"></div>
            </div>
        </div>
        <div>
            <h4 class="font-semibold text-gray-100 text-sm">Mode Senyap</h4>
            <p id="dnd-status" class="text-[11px] text-gray-500 mt-0.5">Tahan Notifikasi: Off</p>
        </div>
    </div>

    <div class="bg-gradient-to-br from-[#2a2a2d] to-[#18181b] p-5 rounded-[20px] shadow-xl border border-[#3f3f46] flex flex-col justify-center relative overflow-hidden group">
        <svg class="absolute -bottom-2 -right-2 w-16 h-16 text-gray-500/10 group-hover:text-gray-400/20 transition duration-500" fill="currentColor" viewBox="0 0 24 24"><path d="M14.017 21v-7.391c0-5.704 3.731-9.57 8.983-10.609l.995 2.151c-2.432.917-3.995 3.638-3.995 5.849h4v10h-9.983zm-14.017 0v-7.391c0-5.704 3.748-9.57 9-10.609l.996 2.151c-2.433.917-3.996 3.638-3.996 5.849h3.983v10h-9.983z"></path></svg>
        <p id="quote-text" class="text-sm font-medium text-gray-300 italic relative z-10 leading-relaxed drop-shadow-md">"Satu jam deep work lebih baik dari tiga jam kerja terdistraksi."</p>
    </div>
</div>
