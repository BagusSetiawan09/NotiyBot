<header class="mb-8 mt-2">
    <p class="text-gray-400 text-sm mb-1 font-medium">Interval Notifikasi</p>
    <h1 class="text-3xl font-bold tracking-tight text-white">Waktu Default</h1>
</header>

<div class="space-y-4"> 
    <div class="bg-[#242427] border border-[#3f3f46] rounded-[16px] overflow-hidden shadow-xl">
        <div class="p-4 flex justify-between items-center border-b border-[#3f3f46]/50 hover:bg-[#2a2a2d] transition duration-300 group">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-cyan-500/10 flex items-center justify-center text-cyan-400 group-hover:scale-105 group-hover:bg-cyan-500/20 transition duration-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                </div>
                <div>
                    <h4 class="font-semibold text-gray-100 text-base">Ingatkan Minum</h4>
                    <p class="text-[13px] text-gray-500 mt-0.5">Jeda waktu antar notifikasi air</p>
                </div>
            </div>
            <div class="relative flex items-center">
                <input type="number" id="input-water" value="45" class="w-20 bg-[#18181b] border border-[#3f3f46] rounded-lg py-2 pl-3 pr-8 text-white font-medium text-right text-sm focus:outline-none focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500/50 transition">
                <span class="absolute right-3 text-gray-500 font-medium text-sm select-none pointer-events-none">m</span>
            </div>
        </div>

        <div class="p-4 flex justify-between items-center hover:bg-[#2a2a2d] transition duration-300 group">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-orange-500/10 flex items-center justify-center text-orange-400 group-hover:scale-105 group-hover:bg-orange-500/20 transition duration-300">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                </div>
                <div>
                    <h4 class="font-semibold text-gray-100 text-base">Ingatkan Peregangan</h4>
                    <p class="text-[13px] text-gray-500 mt-0.5">Jeda waktu untuk berdiri & peregangan</p>
                </div>
            </div>
            <div class="relative flex items-center">
                <input type="number" id="input-stretch" value="120" class="w-20 bg-[#18181b] border border-[#3f3f46] rounded-lg py-2 pl-3 pr-8 text-white font-medium text-right text-sm focus:outline-none focus:border-orange-500 focus:ring-1 focus:ring-orange-500/50 transition">
                <span class="absolute right-3 text-gray-500 font-medium text-sm select-none pointer-events-none">m</span>
            </div>
        </div>
    </div>

    <div class="flex justify-end mt-4">
        <button id="btn-save" onclick="saveAndStartTimer()" class="bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-500 hover:to-blue-400 text-white font-medium text-sm py-2.5 px-6 rounded-lg shadow-[0_0_15px_rgba(59,130,246,0.2)] hover:shadow-[0_0_20px_rgba(59,130,246,0.3)] transition-all duration-300 transform hover:-translate-y-0.5 flex items-center gap-2">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7H5a2 2 0 00-2 2v9a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-3m-1 4l-3 3m0 0l-3-3m3 3V4"></path></svg>
            <span>Simpan Perubahan</span>
        </button>
    </div>
</div>
