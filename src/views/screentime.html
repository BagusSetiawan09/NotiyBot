<div class="flex flex-col h-full w-full fade-in pb-10 relative px-2">
    
    <header class="flex justify-between items-end mb-6 mt-2">
        <div>
            <h1 class="text-3xl font-bold tracking-tight text-white mb-1">Screen Time</h1>
            <p class="text-gray-400 text-sm font-medium">Activity Analytics</p>
        </div>
        
        <div class="flex bg-[#18181b] p-1 rounded-xl border border-[#3f3f46]">
            <button id="st-tab-day" onclick="switchScreenTimeTab('day')" class="px-4 py-1.5 text-sm font-bold rounded-lg bg-blue-600 text-white shadow-sm transition-all duration-300">Day</button>
            <button id="st-tab-week" onclick="switchScreenTimeTab('week')" class="px-4 py-1.5 text-sm font-bold rounded-lg text-gray-400 hover:text-white transition-all duration-300">Week</button>
        </div>
    </header>

    <div class="bg-[#18181b] border border-[#3f3f46] rounded-2xl p-6 mb-8 flex justify-between items-center shadow-sm">
        <div class="flex flex-col">
            <h2 class="text-5xl font-medium text-white mb-1 tracking-tight" id="st-total-text">0m</h2>
            <p class="text-gray-500 text-[11px] font-bold uppercase tracking-[0.2em]" id="st-subtitle-text">screen time today</p>
        </div>
        
        <div class="bg-green-500/10 border border-green-500/20 text-green-400 px-3 py-1.5 rounded-lg flex items-center gap-1.5 text-sm font-medium shadow-sm">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 17h8m0 0V9m0 8l-8-8-4 4-6-6"></path></svg>
            Live Tracking
        </div>
    </div>

    <div class="flex-1 flex flex-col">
        
        <div class="flex justify-between items-center mb-4 px-1">
            <h3 class="text-gray-400 text-[11px] font-bold uppercase tracking-[0.2em]" id="st-section-title">Today Activity</h3>
            <button onclick="clearScreenTime()" id="btn-clear-st" class="text-gray-500 hover:text-red-400 transition flex items-center gap-1.5 text-[10px] font-bold uppercase tracking-wider bg-[#18181b] hover:bg-red-500/10 px-2.5 py-1 rounded-md border border-[#3f3f46] hover:border-red-500/30">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                Clear
            </button>
        </div>
        
        <div class="bg-[#18181b] border border-[#3f3f46] rounded-2xl p-6 shadow-sm min-h-[300px]">
            
            <div id="screentime-timeline-container" class="flex flex-col transition-opacity duration-300">
                </div>

            <div id="screentime-week-container" class="hidden flex-col h-full justify-end transition-opacity duration-300 pt-4 pb-2">
                </div>

        </div>
    </div>
</div>
