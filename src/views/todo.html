<header class="mb-5 mt-2 flex justify-between items-end">
    <div>
        <p class="text-gray-400 text-sm mb-1 font-medium">Manajemen Tugas</p>
        <h1 class="text-3xl font-bold tracking-tight text-white">Target Harian</h1>
    </div>
</header>

<div class="w-full">
    
    <div class="flex space-x-1 bg-[#18181b] p-1 rounded-xl border border-[#3f3f46] mb-5 w-full max-w-[320px]">
        <button id="tab-todo" onclick="switchTodoTab('todo')" class="flex-1 py-1.5 text-sm font-medium rounded-lg bg-[#3f3f46] text-white shadow-sm transition-all duration-300">To-Do</button>
        <button id="tab-task" onclick="switchTodoTab('task')" class="flex-1 py-1.5 text-sm font-medium rounded-lg text-gray-400 hover:text-white transition-all duration-300">Task</button>
        <button id="tab-history" onclick="switchTodoTab('history')" class="flex-1 py-1.5 text-sm font-medium rounded-lg text-gray-400 hover:text-white transition-all duration-300">History</button>
    </div>

    <div id="todo-input-container" class="relative flex items-center mb-5 transition-all duration-300">
        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        </div>
        <input type="text" id="todo-input" placeholder="Tambahkan to-do ringan..." class="w-full bg-[#242427] border border-[#3f3f46] rounded-xl py-3 pl-11 pr-28 text-white text-sm focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500/50 transition-all shadow-md placeholder-gray-500" onkeypress="if(event.key === 'Enter') addTask()">
        <button onclick="addTask()" class="absolute right-1.5 top-1.5 bottom-1.5 bg-blue-600 hover:bg-blue-500 text-white font-medium text-sm px-5 rounded-lg transition shadow-[0_0_15px_rgba(59,130,246,0.2)]">Tambah</button>
    </div>

    <div id="btn-show-task-form" class="hidden mb-5 transition-all duration-300">
        <button onclick="toggleTaskForm(true)" class="w-full border border-dashed border-[#3f3f46] text-gray-400 hover:text-white hover:border-blue-500 hover:bg-[#242427] transition rounded-xl py-3 flex items-center justify-center gap-2 text-sm font-medium">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> 
            Buat Task / Project Baru
        </button>
    </div>

    <div id="task-input-container" class="hidden bg-[#242427] border border-[#3f3f46] rounded-xl p-4 mb-5 shadow-xl transition-all duration-300">
        <input type="text" id="task-title" placeholder="Judul Task (Contoh: Fix Bug Production)" class="w-full bg-[#18181b] border border-[#3f3f46] rounded-lg py-2.5 px-4 text-white text-sm font-semibold focus:border-blue-500 focus:ring-1 focus:ring-blue-500/50 outline-none mb-3 placeholder-gray-600 transition">
        
        <textarea id="task-desc" rows="2" placeholder="Deskripsi detail tentang task ini..." class="w-full bg-[#18181b] border border-[#3f3f46] rounded-lg py-2.5 px-4 text-white text-sm focus:border-blue-500 focus:ring-1 focus:ring-blue-500/50 outline-none mb-4 resize-none placeholder-gray-600 transition"></textarea>

        <div class="flex items-center justify-between">
            <div class="flex gap-3 items-center">
                <div class="relative">
                    <select id="task-priority" class="appearance-none bg-[#18181b] border border-[#3f3f46] text-sm text-gray-300 rounded-lg pl-4 pr-9 py-2 outline-none focus:border-blue-500 cursor-pointer transition w-[110px]">
                        <option value="normal">Normal</option>
                        <option value="urgent">Urgent</option>
                    </select>
                    <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>
                </div>

                <button onclick="document.getElementById('task-file').click()" class="flex items-center gap-2 text-sm text-gray-400 hover:text-white transition bg-[#18181b] border border-[#3f3f46] hover:border-gray-500 px-4 py-2 rounded-lg truncate max-w-[160px]">
                    <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg> 
                    <span id="task-file-name" class="truncate">Lampirkan File</span>
                </button>
                <input type="file" id="task-file" class="hidden" onchange="updateFileName(this)">
            </div>

            <div class="flex gap-2">
                <button onclick="toggleTaskForm(false)" class="text-sm px-4 py-2 text-gray-400 hover:text-white transition font-medium">Batal</button>
                <button onclick="submitTask()" class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium px-5 py-2 rounded-lg transition shadow-[0_0_10px_rgba(59,130,246,0.3)]">Simpan Task</button>
            </div>
        </div>
    </div>

    <div id="todo-list-container" class="space-y-3 pb-6"></div>
</div>

<div id="modal-task-detail" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] flex items-center justify-center p-6 opacity-0 pointer-events-none transition-all duration-300">
    <div class="bg-[#18181b] border border-[#3f3f46] w-full max-w-md rounded-[20px] shadow-2xl p-7 transform scale-95 transition-transform duration-300 relative" id="task-detail-content">
        <button onclick="closeTaskDetail()" class="absolute top-5 right-5 text-gray-500 hover:text-white transition p-1 rounded-md hover:bg-[#3f3f46]">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
        </button>
        
        <div class="mb-4" id="detail-priority-badge"></div>
        <h2 id="detail-title" class="text-xl font-bold text-white mb-5 leading-snug">Judul Task</h2>
        
        <div class="bg-[#242427] border border-[#3f3f46] rounded-xl p-4 mb-4">
            <p class="text-[11px] text-gray-400 font-bold tracking-widest uppercase mb-1.5">Deskripsi</p>
            <p id="detail-desc" class="text-sm text-gray-300 leading-relaxed whitespace-pre-wrap">Deskripsi tugas...</p>
        </div>

        <div id="detail-file-container" class="hidden mb-2">
            <p class="text-[11px] text-gray-400 font-bold tracking-widest uppercase mb-1.5">Lampiran File</p>
            
            <div id="detail-image-preview" class="hidden mb-3 w-full h-40 rounded-xl border border-[#3f3f46] overflow-hidden bg-[#18181b] relative group cursor-pointer">
                <img id="detail-preview-img" src="" class="w-full h-full object-cover opacity-90 group-hover:opacity-100 transition duration-300">
                <div class="absolute inset-0 bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition duration-300">
                    <span class="text-white text-sm font-bold tracking-widest flex items-center gap-2">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0zM10 7v3m0 0v3m0-3h3m-3 0H7"></path></svg> 
                        LIHAT PENUH
                    </span>
                </div>
            </div>

            <button id="detail-file-btn" class="w-full flex items-center justify-between bg-[#242427] border border-[#3f3f46] hover:border-blue-500 hover:bg-[#2a2a2d] transition rounded-xl p-3 group shadow-sm">
                <div class="flex items-center gap-3 overflow-hidden">
                    <div class="w-10 h-10 rounded-lg bg-blue-500/10 flex items-center justify-center text-blue-400 flex-shrink-0 group-hover:scale-105 transition">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                    </div>
                    <span id="detail-file-name" class="text-sm text-gray-200 font-medium truncate">nama-file.png</span>
                </div>
                <div class="flex items-center gap-1 text-xs font-semibold text-blue-400 opacity-0 group-hover:opacity-100 transition translate-x-2 group-hover:translate-x-0" id="detail-file-action-text">
                    BUKA EKSTERNAL <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                </div>
            </button>
        </div>
    </div>
</div>

<div id="modal-image-viewer" class="fixed inset-0 bg-black/90 backdrop-blur-md z-[80] flex items-center justify-center p-6 opacity-0 pointer-events-none transition-all duration-300" onclick="closeImageViewer()">
    
    <button class="absolute top-6 right-6 z-50 text-gray-400 hover:text-white transition bg-[#27272a] hover:bg-[#3f3f46] rounded-full p-2.5 shadow-lg cursor-pointer" onclick="closeImageViewer()">
        <svg class="w-6 h-6 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>
    
    <img id="viewer-full-img" src="" class="max-w-full max-h-full rounded-lg shadow-2xl transform scale-95 transition-transform duration-300 object-contain" onclick="event.stopPropagation()">
</div>
