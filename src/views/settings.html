<header class="mb-8 mt-2 flex justify-between items-end">
    <div>
        <p class="text-gray-400 text-sm mb-1 font-medium">Personalization</p>
        <h1 class="text-3xl font-bold tracking-tight">All Reminders</h1>
    </div>
    <button onclick="openModal()" class="bg-blue-600 hover:bg-blue-500 text-white font-medium px-5 py-2.5 rounded-lg transition flex items-center gap-2">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> Create New
    </button>
</header>

<h3 class="text-xs font-bold text-gray-500 mb-3 tracking-widest uppercase">Default Mode</h3>
<div class="flex flex-col gap-3 mb-8">
    <div class="flex items-center justify-between bg-[#27272a] p-4 rounded-2xl border border-[#3f3f46]">
        <div class="flex items-center gap-4">
            <div class="bg-[#3f3f46] p-3 rounded-xl text-cyan-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg></div>
            <div><h4 class="font-semibold text-gray-100">Waktunya Minum</h4><p class="text-xs text-gray-400">Water drinking reminder</p></div>
        </div>
        <div class="flex gap-2">
            <button onclick="changeAnimation('water')" class="text-sm font-medium bg-[#3f3f46] hover:bg-white hover:text-black px-4 py-2 rounded-lg transition shadow-sm">Change Face</button>
            <button onclick="resetAnimation('water')" class="text-sm font-medium hover:bg-orange-500/20 text-orange-400 hover:text-orange-300 px-3 py-2 rounded-lg transition">Reset Face</button>
        </div>
    </div>
    <div class="flex items-center justify-between bg-[#27272a] p-4 rounded-2xl border border-[#3f3f46]">
        <div class="flex items-center gap-4">
            <div class="bg-[#3f3f46] p-3 rounded-xl text-orange-400"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></div>
            <div><h4 class="font-semibold text-gray-100">Exercise</h4><p class="text-xs text-gray-400">Reminder for sitting too long</p></div>
        </div>
        <div class="flex gap-2">
            <button onclick="changeAnimation('stretch')" class="text-sm font-medium bg-[#3f3f46] hover:bg-white hover:text-black px-4 py-2 rounded-lg transition shadow-sm">Ubah Face</button>
            <button onclick="resetAnimation('stretch')" class="text-sm font-medium hover:bg-orange-500/20 text-orange-400 hover:text-orange-300 px-3 py-2 rounded-lg transition">Reset Face</button>
        </div>
    </div>
</div>

<h3 class="text-xs font-bold text-gray-500 mb-3 tracking-widest uppercase">Custom Mode</h3>
<div id="custom-modes-container" class="flex flex-col gap-3"></div>
