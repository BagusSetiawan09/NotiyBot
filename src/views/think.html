<div class="flex flex-col h-full w-full fade-in pb-6 relative px-2">
    
    <header class="mb-4 mt-2 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <button onclick="toggleChatHistory()" class="p-2 text-gray-400 hover:text-white bg-[#242427] border border-[#3f3f46] hover:border-blue-500 rounded-lg transition shadow-sm" title="Riwayat Obrolan">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
            </button>
            <div>
                <p class="text-blue-400 text-[10px] mb-0.5 font-bold tracking-widest uppercase flex items-center gap-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg> AI Assistant
                </p>
                <h1 class="text-xl font-bold tracking-tight text-white line-clamp-1" id="chat-header-title">Obrolan Baru</h1>
            </div>
        </div>
        
        <div class="flex items-center gap-2">
            <button onclick="toggleZenDrawer()" class="text-xs font-bold text-purple-400 bg-purple-500/10 hover:bg-purple-500/20 border border-purple-500/30 px-3 py-2 rounded-lg transition flex items-center gap-1.5" title="Buka Zen Scratchpad">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg> Zen Pad
            </button>
            <div class="w-px h-5 bg-[#3f3f46] mx-1"></div> <button onclick="createNewChat()" class="text-xs font-medium text-white bg-blue-600 hover:bg-blue-500 px-3 py-2 rounded-lg transition shadow-sm flex items-center gap-1.5">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg> New Chat
            </button>
            <button onclick="openApiModal()" class="p-2 text-gray-400 hover:text-white bg-[#242427] border border-[#3f3f46] hover:border-blue-500 rounded-lg transition shadow-sm" title="Pengaturan API">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path></svg>
            </button>
        </div>
    </header>

    <div class="relative w-full h-[65vh] flex overflow-hidden">
        
        <div id="ai-view-container" class="w-full flex flex-col h-full transition-all duration-500 ease-[cubic-bezier(0.25,1,0.5,1)]">
            <div id="chat-container" class="flex-1 overflow-y-auto space-y-5 pr-3 pb-4 scroll-smooth"></div>

            <div class="relative mt-2 bg-[#18181b] border border-[#3f3f46] rounded-2xl shadow-xl transition-all focus-within:border-blue-500 focus-within:ring-1 focus-within:ring-blue-500/50 flex flex-col z-[40]">
                <div id="ai-attachment-preview" class="hidden px-4 pt-3 flex items-center gap-2">
                    <div class="bg-blue-500/10 text-blue-400 border border-blue-500/20 rounded-lg px-3 py-1.5 flex items-center gap-2 max-w-[200px]">
                        <svg class="w-4 h-4 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                        <span id="ai-attachment-name" class="text-xs font-medium truncate">file.png</span>
                        <button onclick="removeAiAttachment()" class="hover:text-red-400 hover:bg-red-500/20 rounded-full p-0.5 ml-1 transition">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                        </button>
                    </div>
                </div>

                <textarea id="ai-input" rows="1" placeholder="Ask AI..." class="w-full bg-transparent pt-4 pb-2 px-4 text-white text-sm focus:outline-none placeholder-gray-600 resize-none overflow-hidden max-h-32 custom-scrollbar" oninput="this.style.height = ''; this.style.height = this.scrollHeight + 'px'" onkeydown="if(event.key === 'Enter' && !event.shiftKey) { event.preventDefault(); sendChatMessage(); }"></textarea>

                <div class="flex items-center justify-between px-2 pb-2 pt-1">
                    <div class="flex items-center gap-1">
                        <button onclick="document.getElementById('ai-file-input').click()" class="p-2.5 text-gray-500 hover:text-blue-400 transition hover:bg-[#27272a] rounded-xl flex-shrink-0" title="Lampirkan File">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.172 7l-6.586 6.586a2 2 0 102.828 2.828l6.414-6.586a4 4 0 00-5.656-5.656l-6.415 6.585a6 6 0 108.486 8.486L20.5 13"></path></svg>
                        </button>
                        <input type="file" id="ai-file-input" class="hidden" accept="image/png, image/jpeg, image/webp, application/pdf" onchange="handleAiFileSelect(this)">
                        
                        <button id="btn-mic" onclick="toggleVoiceInput()" class="p-2.5 text-gray-500 hover:text-red-400 transition hover:bg-[#27272a] rounded-xl flex-shrink-0" title="Voice Note">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path></svg>
                        </button>

                        <button onclick="openCameraModal()" class="p-2.5 text-gray-500 hover:text-purple-400 transition hover:bg-[#27272a] rounded-xl flex-shrink-0" title="Kamera Vision">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                        </button>
                    </div>
                    
                    <div class="flex items-center gap-2 relative">
                        <button onclick="toggleModelSelector()" id="btn-model-trigger" class="flex items-center gap-1.5 text-[13px] font-medium text-gray-300 hover:text-white bg-[#27272a] hover:bg-[#3f3f46] px-3.5 py-2 rounded-xl transition border border-[#3f3f46]">
                            <span id="current-model-text">Fast</span>
                            <svg class="w-3.5 h-3.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                        </button>

                        <div id="ai-model-menu" class="absolute bottom-full right-12 mb-3 w-[280px] bg-[#1f2023] border border-[#3f3f46] rounded-2xl shadow-2xl opacity-0 pointer-events-none transition-all duration-200 transform translate-y-2 z-50 overflow-hidden">
                            <div class="px-4 py-3 border-b border-[#3f3f46]/50"><span class="text-xs font-bold tracking-widest text-gray-400 uppercase">Gemini Models</span></div>
                            <div class="p-2 flex flex-col">
                                <button onclick="selectAiModel('gemini-2.5-flash', 'Cepat', 'cepat')" class="flex items-center justify-between p-3 rounded-xl hover:bg-[#27272a] text-left transition group">
                                    <div><h4 class="text-[13px] font-semibold text-gray-200 group-hover:text-white">Fast</h4><p class="text-[11px] text-gray-500 mt-0.5">Answer straight to the point</p></div>
                                    <div id="check-cepat" class="text-blue-500 model-check"><svg class="w-5 h-5 bg-blue-500/20 rounded-full p-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                                </button>
                                <button onclick="selectAiModel('gemini-2.5-flash', 'Penalaran', 'penalaran')" class="flex items-center justify-between p-3 rounded-xl hover:bg-[#27272a] text-left transition group">
                                    <div><h4 class="text-[13px] font-semibold text-gray-200 group-hover:text-white">Reasoning</h4><p class="text-[11px] text-gray-500 mt-0.5">Deep analysis step-by-step</p></div>
                                    <div id="check-penalaran" class="text-blue-500 model-check hidden"><svg class="w-5 h-5 bg-blue-500/20 rounded-full p-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                                </button>
                                <button onclick="selectAiModel('gemini-2.5-flash', 'Pro', 'pro')" class="flex items-center justify-between p-3 rounded-xl hover:bg-[#27272a] text-left transition group">
                                    <div><h4 class="text-[13px] font-semibold text-gray-200 group-hover:text-white">Pro</h4><p class="text-[11px] text-gray-500 mt-0.5">Coding & complex solutions expert</p></div>
                                    <div id="check-pro" class="text-blue-500 model-check hidden"><svg class="w-5 h-5 bg-blue-500/20 rounded-full p-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg></div>
                                </button>
                            </div>
                        </div>

                        <button onclick="sendChatMessage()" id="btn-send-chat" class="w-10 h-10 bg-blue-600 hover:bg-blue-500 text-white rounded-xl flex items-center justify-center transition flex-shrink-0">
                            <svg class="w-4 h-4 translate-x-[-1px] translate-y-[1px]" fill="currentColor" viewBox="0 0 20 20"><path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z"></path></svg>
                        </button>
                        
                        <button onclick="stopAiGeneration()" id="btn-stop-chat" class="hidden w-10 h-10 bg-red-600 hover:bg-red-500 text-white rounded-xl flex items-center justify-center transition flex-shrink-0" title="Berhentikan AI">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1 1v4a1 1 0 001 1h4a1 1 0 001-1V8a1 1 0 00-1-1H8z" clip-rule="evenodd"></path></svg>
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div id="drawer-zen-notes" class="absolute top-0 right-0 bottom-0 w-[450px] max-w-[90vw] bg-[#18181b]/95 backdrop-blur-xl border border-[#3f3f46] shadow-[-20px_0_60px_rgba(0,0,0,0.5)] transform translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.25,1,0.5,1)] z-[80] flex flex-col rounded-2xl overflow-hidden">
            
            <div class="px-5 py-4 border-b border-[#3f3f46] bg-[#1f2023] flex justify-between items-center shrink-0">
                <div class="flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-purple-500 animate-pulse"></div>
                    <span class="text-[11px] font-bold text-gray-300 tracking-widest uppercase">Zen Scratchpad</span>
                </div>
                <div class="flex gap-2 items-center">
                    <span id="zen-save-status" class="text-[10px] text-green-400 font-bold opacity-0 transition-opacity flex items-center gap-1 mr-2"><svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg> Saved</span>
                    <button onclick="copyZenNotes()" class="p-1.5 text-gray-400 hover:text-white bg-[#27272a] rounded-lg transition" title="Copy All HTML"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
                    <button onclick="clearZenNotes()" class="p-1.5 text-gray-400 hover:text-red-400 bg-[#27272a] rounded-lg transition" title="Clear Pad"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg></button>
                    <button onclick="toggleZenDrawer()" class="p-1.5 text-gray-400 hover:text-white bg-red-500/10 hover:bg-red-500 rounded-lg transition ml-1"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
                </div>
            </div>

            <div class="px-4 py-2 bg-[#242427] border-b border-[#3f3f46] flex items-center gap-1.5 overflow-x-auto custom-scrollbar shrink-0">
                <button onclick="formatZen('formatBlock', 'H1')" class="p-1.5 text-gray-300 hover:text-white hover:bg-[#3f3f46] rounded-md transition text-xs font-bold px-2" title="Heading 1">H1</button>
                <button onclick="formatZen('formatBlock', 'H2')" class="p-1.5 text-gray-300 hover:text-white hover:bg-[#3f3f46] rounded-md transition text-xs font-bold px-2" title="Heading 2">H2</button>
                <div class="w-px h-4 bg-[#3f3f46] mx-1"></div>
                <button onclick="formatZen('insertUnorderedList')" class="p-1.5 text-gray-300 hover:text-white hover:bg-[#3f3f46] rounded-md transition" title="Bullet List (-)"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16M8 6h.01M8 12h.01M8 18h.01"></path></svg></button>
                <button onclick="formatZen('insertOrderedList')" class="p-1.5 text-gray-300 hover:text-white hover:bg-[#3f3f46] rounded-md transition" title="Number List (1.)"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 6h14M7 12h14M7 18h14M3 6h.01M3 12h.01M3 18h.01"></path></svg></button>
                <div class="w-px h-4 bg-[#3f3f46] mx-1"></div>
                <button onclick="formatZen('bold')" class="p-1.5 text-gray-300 hover:text-white hover:bg-[#3f3f46] rounded-md transition" title="Bold (Ctrl+B)"><b class="font-serif text-[13px] px-1">B</b></button>
                <button onclick="formatZen('italic')" class="p-1.5 text-gray-300 hover:text-white hover:bg-[#3f3f46] rounded-md transition" title="Italic (Ctrl+I)"><i class="font-serif text-[13px] px-1">I</i></button>
                <button onclick="insertZenLink()" class="p-1.5 text-gray-300 hover:text-white hover:bg-[#3f3f46] rounded-md transition" title="Insert Link"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg></button>
                <div class="w-px h-4 bg-[#3f3f46] mx-1"></div>
                <button onclick="insertZenTable()" class="p-1.5 text-gray-300 hover:text-white hover:bg-[#3f3f46] rounded-md transition" title="Insert Table"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v8a2 2 0 002 2z"></path></svg></button>
                <div class="flex-1"></div>
                <button onclick="formatZen('removeFormat')" class="p-1.5 text-gray-400 hover:text-red-400 hover:bg-[#3f3f46] rounded-md transition" title="Clear Format"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg></button>
            </div>

            <style>
                .zen-rich-editor[placeholder]:empty:before {
                    content: attr(placeholder);
                    color: #52525b;
                    pointer-events: none;
                    display: block;
                }
                .zen-rich-editor h1 { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: 0.5em; margin-top: 0.5em; }
                .zen-rich-editor h2 { font-size: 1.25rem; font-weight: 700; color: #e4e4e7; margin-bottom: 0.5em; margin-top: 0.5em; }
                .zen-rich-editor ul { list-style-type: disc; margin-left: 1.5rem; margin-bottom: 0.5em; }
                .zen-rich-editor ol { list-style-type: decimal; margin-left: 1.5rem; margin-bottom: 0.5em; }
                .zen-rich-editor li { margin-bottom: 0.25em; }
                .zen-rich-editor b, .zen-rich-editor strong { color: #fff; font-weight: 700; }
                .zen-rich-editor i, .zen-rich-editor em { font-style: italic; }
                .zen-rich-editor a { color: #60a5fa; text-decoration: underline; text-underline-offset: 2px; transition: color 0.2s; }
                .zen-rich-editor table { width: 100%; border-collapse: collapse; margin: 1em 0; border: 1px solid #3f3f46; }
                .zen-rich-editor th, .zen-rich-editor td { border: 1px solid #3f3f46; padding: 8px 12px; text-align: left; }
                .zen-rich-editor th { background-color: #27272a; font-weight: bold; color: white; }
                .zen-rich-editor td { background-color: rgba(24, 24, 27, 0.5); }
                
                .zen-rich-editor.ctrl-pressed a:hover {
                    cursor: pointer !important;
                    color: #93c5fd;
                }
            </style>

            <div id="zen-notes-input" contenteditable="true" spellcheck="false" class="zen-rich-editor flex-1 w-full bg-transparent p-6 text-gray-300 text-[14px] leading-relaxed focus:outline-none overflow-y-auto custom-scrollbar" placeholder="Brain-dump your ideas here...&#10;&#10;💡 Pro Tips:&#10;- Type '- ' for bullets&#10;- Type '1. ' for numbers&#10;- Use Ctrl+B to bold text"></div>
            
        </div>

    </div>
</div>

<div id="drawer-chat-history" class="absolute top-0 bottom-0 left-0 w-72 bg-[#18181b]/95 backdrop-blur-xl border-r border-[#3f3f46] shadow-2xl transform -translate-x-full transition-transform duration-300 z-[70] flex flex-col rounded-l-[20px]">
    <div class="p-5 border-b border-[#3f3f46] flex items-center justify-between">
        <h2 class="text-white font-bold tracking-wide">Chat History</h2>
        <button onclick="toggleChatHistory()" class="text-gray-400 hover:text-white transition p-1.5 rounded-md hover:bg-[#3f3f46]"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
    </div>
    <div class="flex-1 overflow-y-auto p-3 space-y-1.5 scroll-smooth" id="chat-history-list"></div>
</div>
<div id="drawer-backdrop" onclick="toggleChatHistory()" class="absolute inset-0 bg-black/60 backdrop-blur-sm z-[65] opacity-0 pointer-events-none transition-opacity duration-300 rounded-[20px]"></div>

<div id="modal-api-key" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[80] flex items-center justify-center p-6 opacity-0 pointer-events-none transition-all duration-300">
    <div class="bg-[#18181b] border border-[#3f3f46] w-full max-w-md rounded-[20px] shadow-2xl p-7 transform scale-95 transition-transform duration-300 relative" id="api-modal-content">
        <h2 class="text-xl font-bold text-white mb-2">Google Gemini API Key</h2>
        <p class="text-xs text-gray-400 mb-6 leading-relaxed">Enter the API key from Google Studio.</p>
        <input type="password" id="input-api-key" placeholder="Paste API Key Anda di sini..." class="w-full bg-[#242427] border border-[#3f3f46] rounded-xl px-4 py-3 text-white text-sm focus:outline-none focus:border-blue-500 transition mb-4 font-mono">
        <div class="flex items-center justify-between mt-2">
            <a href="https://aistudio.google.com/app/apikey" target="_blank" class="text-xs text-blue-400 hover:text-blue-300 underline underline-offset-2">Get Free API Key</a>
            <div class="flex gap-2">
                <button onclick="closeApiModal()" class="text-sm px-4 py-2 text-gray-400 hover:text-white transition font-medium">Cancel</button>
                <button onclick="saveApiKey()" class="bg-blue-600 hover:bg-blue-500 text-white text-sm font-medium px-5 py-2 rounded-lg transition">Save Key</button>
            </div>
        </div>
    </div>
</div>

<div id="modal-preview" class="fixed inset-0 bg-black/90 backdrop-blur-xl z-[90] flex items-center justify-center p-6 opacity-0 pointer-events-none transition-all duration-300">
    <div class="bg-[#1e1e24] border border-[#3f3f46] w-full max-w-[95vw] h-[95vh] rounded-[24px] shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-300" id="preview-modal-content">
        <div class="px-5 py-3.5 border-b border-[#3f3f46] flex items-center justify-between bg-[#18181b]">
            <div class="flex items-center justify-end w-full">
                <button onclick="closePreview()" class="text-gray-400 hover:text-white transition p-1.5 hover:bg-red-500 rounded-lg"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
        </div>
        <div class="flex-1 bg-[#0f0f11] relative overflow-hidden flex items-center justify-center p-6 shadow-[inset_0_10px_30px_rgba(0,0,0,0.5)]">
            <div id="preview-wrapper" class="w-full h-full bg-white transition-all duration-500 ease-[cubic-bezier(0.25,1,0.5,1)] relative origin-center rounded-sm shadow-[0_0_50px_rgba(0,0,0,0.5)]">
                <iframe id="preview-iframe" class="w-full h-full border-none rounded-[inherit]" sandbox="allow-scripts allow-same-origin allow-popups"></iframe>
            </div>
        </div>
    </div>
</div>

<div id="modal-camera" class="fixed inset-0 bg-black/95 backdrop-blur-md z-[95] flex items-center justify-center p-6 opacity-0 pointer-events-none transition-all duration-300">
    <div class="bg-[#18181b] border border-[#3f3f46] w-full max-w-3xl rounded-[24px] shadow-2xl flex flex-col overflow-hidden transform scale-95 transition-transform duration-300 max-h-[90vh]" id="camera-modal-content">
        
        <div class="px-5 py-3.5 border-b border-[#3f3f46] flex items-center justify-between bg-[#1f2023] shrink-0">
            <span class="text-[11px] font-bold text-gray-400 tracking-widest uppercase flex items-center gap-2 w-1/3">
                <svg class="w-4 h-4 text-purple-500" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M4 5a2 2 0 00-2 2v8a2 2 0 002 2h12a2 2 0 002-2V7a2 2 0 00-2-2h-1.586a1 1 0 01-.707-.293l-1.121-1.121A2 2 0 0011.172 3H8.828a2 2 0 00-1.414.586L6.293 4.707A1 1 0 015.586 5H4zm6 9a3 3 0 100-6 3 3 0 000 6z" clip-rule="evenodd"></path></svg>
                Vision
            </span>
            
            <div class="flex justify-center w-1/3">
                <select id="camera-select" onchange="switchCamera()" class="bg-[#242427] border border-[#3f3f46] text-gray-300 text-[11px] rounded-lg px-2 py-1.5 focus:outline-none focus:border-purple-500 w-full max-w-[200px] truncate shadow-inner cursor-pointer font-medium tracking-wide">
                    <option value="">Detecting Camera...</option>
                </select>
            </div>

            <div class="flex justify-end w-1/3">
                <button onclick="closeCameraModal()" class="text-gray-400 hover:text-white transition p-1.5 hover:bg-red-500 rounded-lg">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
        
        <div class="p-2 bg-black relative flex justify-center items-center flex-1 overflow-hidden min-h-[200px]">
            <video id="webcam-video" class="w-full max-h-[55vh] object-contain rounded-xl transform scale-x-[-1] border border-[#3f3f46]" autoplay playsinline></video>
            <canvas id="webcam-canvas" class="hidden"></canvas>
        </div>
        
        <div class="p-5 bg-[#18181b] flex flex-col items-center justify-center gap-2 shrink-0 border-t border-[#3f3f46]">
            <button onclick="captureCamera()" class="w-16 h-16 rounded-full bg-purple-600 hover:bg-purple-500 border-4 border-[#3f3f46] transition flex items-center justify-center group">
                <div class="w-6 h-6 rounded-full bg-white group-hover:scale-90 transition-transform duration-200"></div>
            </button>
            <p class="text-[10px] font-bold text-gray-500 tracking-widest uppercase mt-2">Take Photo</p>
        </div>
    </div>
</div>
